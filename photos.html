
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="hearts-container"></div>
<div class="container">
<div class="slide-box">
<img id="slide">
<div class="caption" id="caption"></div>
</div>
<button onclick="location.href='reasons.html'">Next</button>
</div>

<script>
const images = ["img1.jpg","img2.jpg","img3.jpg","img4.jpg","img5.jpg","img6.jpg","img7.jpg","img8.jpg"];
const captions = ["1","2","3","4","5","6","7","8"];
let i=0;

function showSlide(){
 if(i>=images.length) return;
 document.getElementById("slide").src = images[i];
 document.getElementById("caption").innerText = captions[i];
 setTimeout(()=>document.getElementById("caption").innerText="",2000);
 setTimeout(()=>{i++; showSlide();},5000);
}
showSlide();
</script>

<script src="script.js"></script>
</body>
</html>
