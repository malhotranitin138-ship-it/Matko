<!DOCTYPE html>
<html>
<head>
<title>Thank You ❤️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="hearts-container"></div>

<div class="container">
<h1>Thank you for being mine ❤️</h1>

<p>
  Thank you for coming into my life and making everything so pyara sa 🥹  
    You are my happiness, my peace 🤍  
    I’m really lucky to have you 💖
</p>

<p>I love you forever 🫶</p>
</div>

<audio id="bgMusic" loop>
<source src="music/main.mp3">
</audio>

<script>
let music=document.getElementById("bgMusic");
if(localStorage.getItem("playMusic")==="true"){
music.volume=0;
music.play().then(()=>{
let v=0;
let fade=setInterval(()=>{
if(v<0.4){v+=0.02; music.volume=v;}
else clearInterval(fade);
},200);
}).catch(()=>{});
}
</script>

<script src="script.js"></script>
</body>
</html>
